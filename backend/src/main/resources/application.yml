spring:
  application:
    name: cascade

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cascade}
    username: ${DATABASE_USERNAME:cascade}
    password: ${DATABASE_PASSWORD:cascade}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # auto-creates tables; use "validate" in production
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

cascade:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

logging:
  level:
    com.cascade: DEBUG
