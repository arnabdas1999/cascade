services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cascade
      POSTGRES_USER: cascade
      POSTGRES_PASSWORD: cascade
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cascade"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/cascade?user=cascade&password=cascade
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://frontend
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on:
      - backend

volumes:
  pgdata:
